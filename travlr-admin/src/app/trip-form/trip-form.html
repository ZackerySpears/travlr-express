<div class="container mt-4">
  <h2>{{ formTrip._id ? 'Edit Trip' : 'Add Trip' }}</h2>

  <form (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label">Code</label>
      <input class="form-control" [(ngModel)]="formTrip.code" name="code">
    </div>

    <div class="mb-3">
      <label class="form-label">Name</label>
      <input class="form-control" [(ngModel)]="formTrip.name" name="name">
    </div>

    <div class="mb-3">
      <label class="form-label">Length</label>
      <input class="form-control" [(ngModel)]="formTrip.length" name="length">
    </div>

    <div class="mb-3">
      <label class="form-label">Start</label>
      <input class="form-control" [(ngModel)]="formTrip.start" name="start">
    </div>

    <div class="mb-3">
      <label class="form-label">Resort</label>
      <input class="form-control" [(ngModel)]="formTrip.resort" name="resort">
    </div>

    <div class="mb-3">
      <label class="form-label">Per Person</label>
      <input class="form-control" [(ngModel)]="formTrip.perPerson" name="perPerson">
    </div>

    <div class="mb-3">
      <label class="form-label">Image</label>
      <input class="form-control" [(ngModel)]="formTrip.image" name="image">
    </div>

    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea class="form-control" [(ngModel)]="formTrip.description" name="description"></textarea>
    </div>

    <button class="btn btn-primary me-2" type="submit">
      {{ formTrip._id ? 'Update Trip' : 'Add Trip' }}
    </button>

    <button
      *ngIf="formTrip._id"
      class="btn btn-secondary"
      type="button"
      (click)="cancelEdit()">
      Cancel
    </button>
  </form>
</div>
