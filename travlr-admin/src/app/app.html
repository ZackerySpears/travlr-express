<div class="container mt-3" *ngIf="authenticationService.isLoggedIn(); else loginBlock">
  <button class="btn btn-danger mb-3" (click)="logout()">Logout</button>

  <app-trip-form
    [trip]="selectedTrip"
    (saved)="onTripSaved()">
  </app-trip-form>

  <app-trip-list
    (editTrip)="onTripEdit($event)">
  </app-trip-list>
</div>

<ng-template #loginBlock>
  <app-login></app-login>
</ng-template>
